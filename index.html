<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarlytaOSint | Dashboard</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard {
            background-color: #1a1a1a;
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.7);
            border-top: 4px solid #d4af37;
            overflow: hidden;
        }
        .header {
            padding: 20px;
            background-color: #111;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { margin: 0; color: #d4af37; font-size: 1.5em; }
        .target-badge {
            background-color: #2c2c2c;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.85em;
            color: #ff5555;
            border: 1px solid #444;
        }
        /* Navigasi Menu/Tabs */
        .nav-tabs {
            display: flex;
            background-color: #151515;
            border-bottom: 1px solid #333;
        }
        .tab-link {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            color: #888;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab-link:hover { color: #fff; background-color: #202020; }
        .tab-link.active {
            color: #d4af37;
            border-bottom: 2px solid #d4af37;
            background-color: #1a1a1a;
            font-weight: bold;
        }
        /* Konten Tab */
        .tab-content { padding: 25px; display: none; }
        .tab-content.active { display: block; }
        
        /* Formulir */
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9em; color: #aaa; }
        input[type="text"], textarea, select {
            width: 100%; padding: 10px; background-color: #252525;
            border: 1px solid #444; color: #fff; border-radius: 4px;
            box-sizing: border-box; font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { border-color: #d4af37; outline: none; }
        
        button.btn-execute {
            width: 100%; padding: 12px; background-color: #d4af37; color: #121212;
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
            font-family: inherit; transition: background 0.3s;
        }
        button.btn-execute:hover { background-color: #b5952f; }
        button:disabled { background-color: #444 !important; color: #888; cursor: not-allowed; }
        
        .status-log {
            margin-top: 15px; padding: 10px; background-color: #111;
            border-radius: 4px; font-size: 0.8em; color: #888; text-align: center;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>[ EarlytaOSint v1.0 ]</h1>
        <div id="activeTargetBadge" class="target-badge">Target: NONE</div>
    </div>

    <div class="nav-tabs">
        <button class="tab-link active" onclick="switchTab(event, 'tab-inisiasi')">1. Inisiasi</button>
        <button class="tab-link" id="menu-footprint" onclick="switchTab(event, 'tab-footprint')" disabled>2. Footprint</button>
        <button class="tab-link" id="menu-behavior" onclick="switchTab(event, 'tab-behavior')" disabled>3. Behavioral Tags</button>
        <button class="tab-link" id="menu-execution" onclick="switchTab(event, 'tab-execution')" disabled>4. Execution Theory</button>
    </div>

    <div id="tab-inisiasi" class="tab-content active">
        <div class="form-group">
            <label>Identifier Awal (Username / Email / Keyword)</label>
            <input type="text" id="init-identifier" placeholder="contoh: ksatria_senja01">
        </div>
        <div class="form-group">
            <label>Catatan Awal Kasus</label>
            <textarea id="init-notes" rows="4" placeholder="Tuliskan konteks atau alasan penelusuran..."></textarea>
        </div>
        <button class="btn-execute" id="btn-init" onclick="submitInisiasi()">Kunci & Inisiasi Target</button>
        <div id="log-inisiasi" class="status-log">Sistem siap menerima entri target baru.</div>
    </div>

    <div id="tab-footprint" class="tab-content">
        <div class="form-group">
            <label>Nama Platform / Media Sosial</label>
            <input type="text" id="fp-platform" placeholder="Contoh: GitHub, LinkedIn, Instagram">
        </div>
        <div class="form-group">
            <label>URL Temuan Jejak</label>
            <input type="text" id="fp-url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Kategori Jejak</label>
            <select id="fp-kategori">
                <option value="Sosial">Sosial / Hiburan</option>
                <option value="Profesional">Profesional / Kerja</option>
                <option value="Akademik">Akademik / Kampus</option>
                <option value="Anonim">Forum / Jejak Anonim</option>
            </select>
        </div>
        <div class="form-group">
            <label>Validitas Temuan</label>
            <select id="fp-validitas">
                <option value="High">Tinggi (Akurat Terverifikasi)</option>
                <option value="Medium">Sedang (Butuh Konfirmasi)</option>
                <option value="Low">Rendah (Kemungkinan Kliping Nama)</option>
            </select>
        </div>
        <button class="btn-execute" onclick="submitFootprint()">Dokumentasikan Jejak (State: RECON)</button>
        <div id="log-footprint" class="status-log">Menunggu input repositori digital.</div>
    </div>

    <div id="tab-behavior" class="tab-content">
        <div class="form-group">
            <label>Pola Waktu Aktif Target</label>
            <input type="text" id="bh-waktu" placeholder="Contoh: Sangat aktif jam 01.00 - 04.00 WIB">
        </div>
        <div class="form-group">
            <label>Gaya Komunikasi / Karakter Bahasa</label>
            <input type="text" id="bh-gaya" placeholder="Contoh: Formal, Sinis, Menggunakan istilah teknis tingkat tinggi">
        </div>
        <div class="form-group">
            <label>Titik Rentan Psikologis (Vulnerability)</label>
            <textarea id="bh-rentan" rows="2" placeholder="Contoh: Terlalu reaktif jika kompetensi teknisnya dipertanyakan"></textarea>
        </div>
        <div class="form-group">
            <label>Minat Spesifik / Obsepsi</label>
            <input type="text" id="bh-minat" placeholder="Contoh: Komunitas OSINT lokal, kolektor kamera analog">
        </div>
        <button class="btn-execute" onclick="submitBehavior()">Petakan Karakter (State: ANALYZING)</button>
        <div id="log-behavior" class="status-log">Siap menganalisis anomali perilaku target.</div>
    </div>

    <div id="tab-execution" class="tab-content">
        <div class="form-group">
            <label>Vektor Pendekatan Simulasi</label>
            <select id="ex-vektor">
                <option value="Phishing via Email">Pengujian Phishing Skenario (Email)</option>
                <option value="Baiting via Professional Network">Rekayasa Sosial Jaringan Profesional (LinkedIn)</option>
                <option value="Spoofing Core System">Uji Penyamaran Identitas Sistem</option>
            </select>
        </div>
        <div class="form-group">
            <label>Rancangan Skenario Narasi (Pretexting)</label>
            <textarea id="ex-narasi" rows="4" placeholder="Tulis rancangan umpan psikologis berdasarkan kelemahan target..."></textarea>
        </div>
        <div class="form-group">
            <label>Estimasi Probabilitas Keberhasilan Teoretis</label>
            <select id="ex-probabilitas">
                <option value="90%">Sangat Tinggi (~90%) - Target Sangat Lengah</option>
                <option value="60%">Moderat (~60%) - Mengandalkan Kelengahan Sesaat</option>
                <option value="30%">Rendah (~30%) - Target Memiliki Kesadaran Keamanan Tinggi</option>
            </select>
        </div>
        <button class="btn-execute" onclick="submitExecution()">Selesaikan Profiling (State: PROFILED)</button>
        <div id="log-execution" class="status-log">Menyusun hipotesis eksekusi akhir.</div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbykgN0YNiaV91FgrG-sIJlyQi0k4cncNF7OgT2YURr1t5F6cyILps4TY8fyw-YT69N-4A/exec";
    let CURRENT_TARGET_ID = null;

    // Fungsi Navigasi Tab
    function switchTab(evt, tabId) {
        const tabcontents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < tabcontents.length; i++) {
            tabcontents[i].className = tabcontents[i].className.replace(" active", "");
        }
        const tablinks = document.getElementsByClassName("tab-link");
        for (let i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabId).className += " active";
        evt.currentTarget.className += " active";
    }

    // Mengaktifkan seluruh menu setelah Target ID didapatkan
    function unlockWorkflow(targetId) {
        CURRENT_TARGET_ID = targetId;
        const badge = document.getElementById("activeTargetBadge");
        badge.innerText = `Target: ${targetId}`;
        badge.style.color = "#55ff55";
        badge.style.borderColor = "#55ff55";

        document.getElementById("menu-footprint").disabled = false;
        document.getElementById("menu-behavior").disabled = false;
        document.getElementById("menu-execution").disabled = false;
    }

    // Pemanggilan API Universal ke GAS
    async function sendToEngine(payload, logElementId, btnElement) {
        const logEl = document.getElementById(logElementId);
        if(btnElement) btnElement.disabled = true;
        logEl.innerText = "Mengirimkan muatan data ke Engine...";
        logEl.style.color = "#888";

        try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            
            if (result.status === "success") {
                logEl.style.color = "#55ff55";
                logEl.innerText = `[SUCCESS] ${result.message}`;
                return result;
            } else {
                throw new Error(result.message);
            }
        } catch (error) {
            logEl.style.color = "#ff5555";
            logEl.innerText = `[CRITICAL ERROR] Gagal menulis ke database.`;
            console.error(error);
            return null;
        } finally {
            if(btnElement) btnElement.disabled = false;
        }
    }

    // 1. Submit Inisiasi Target
    async function submitInisiasi() {
        const identifier = document.getElementById("init-identifier").value;
        const notes = document.getElementById("init-notes").value;
        if (!identifier) return alert("Identifier wajib diisi!");

        const payload = {
            action: "ADD_TARGET",
            data: { identifier: identifier, notes: notes }
        };

        const res = await sendToEngine(payload, "log-inisiasi", document.getElementById("btn-init"));
        if (res && res.target_id) {
            unlockWorkflow(res.target_id);
            document.getElementById("log-inisiasi").innerText += ` Mode Alur Kerja Terbuka.`;
        }
    }

    // Fungsi placeholder untuk pengiriman menu berikutnya (akan kita integrasikan ke GAS di tahap berikutnya)
    function submitFootprint() {
        if (!CURRENT_TARGET_ID) return alert("Inisiasi target terlebih dahulu!");
        alert(`Siap mengirim Jejak untuk ${CURRENT_TARGET_ID}. Kita perlu memperbarui backend GAS untuk menangkap data ini!`);
    }

    function submitBehavior() {
        if (!CURRENT_TARGET_ID) return alert("Inisiasi target terlebih dahulu!");
        alert(`Siap memetakan perilaku untuk ${CURRENT_TARGET_ID}.`);
    }

    function submitExecution() {
        if (!CURRENT_TARGET_ID) return alert("Inisiasi target terlebih dahulu!");
        alert(`Skenario eksekusi dirancang untuk ${CURRENT_TARGET_ID}.`);
    }
</script>

</body>
</html>
